version: "3.9"

# ─────────────────────────────────────────────────────────────────
# Eventara – Docker Compose
#
# Services:
#   db       – PostgreSQL 16 (persistent volume)
#   backend  – FastAPI  (Python 3.11)
#   frontend – React/Vite served by Nginx
# ─────────────────────────────────────────────────────────────────

services:

  # ── 1. PostgreSQL Database ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: eventara_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: eik
      POSTGRES_PASSWORD: eik100305
      POSTGRES_DB: EventaraDatabase
    ports:
      - "5432:5432"          # expose only if you need external DB access
    volumes:
      - postgres_data:/var/lib/postgresql/data   # ← PERSISTENT VOLUME
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eik -d EventaraDatabase"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. FastAPI Backend ──────────────────────────────────────────
  backend:
    image: eqaniqbal/eventara-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventara_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://eik:eik100305@db:5432/EventaraDatabase
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads   # uploaded media files remain persistent
    depends_on:
      db:
        condition: service_healthy  # wait for Postgres to be ready

  # ── 3. React / Nginx Frontend ───────────────────────────────────
  frontend:
    image: eqaniqbal/eventara-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eventara_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

# ─────────────────────────────────────────────────────────────────
# Named Volumes (data persists even when containers are removed)
# ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:    # PostgreSQL data directory
  uploads_data:     # User-uploaded media files
